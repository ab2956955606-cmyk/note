<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的笔记</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/panel.css">
<link rel="stylesheet" href="css/time-picker.css">
</head>
<body>

<!-- ============ NAV ============ -->
<header class="nav">
  <div class="nav-row">
    <div class="nav-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="2" width="16" height="20" rx="3" fill="#007aff" opacity=".2"/>
        <path d="M8 7h8M8 11h8M8 15h5" stroke="#007aff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span data-i18n="navTitle">我的笔记</span>
    </div>
    <div class="nav-right">
      <div class="lang-selector">
        <span class="lang-label">Language</span>
        <span class="lang-opt active" data-lang="zh">中文</span>
        <span class="lang-sep">|</span>
        <span class="lang-opt" data-lang="en">EN</span>
      </div>
      <span class="nav-date" id="navDate"></span>
      <button class="btn-today" id="btnToday" data-i18n="btnToday">今天</button>
    </div>
  </div>
  <div class="nav-toggle" id="calToggle">
    <span data-i18n="navToggle">日历</span> <span class="arrow" id="calArrow">▸</span>
  </div>
</header>

<!-- ============ MAIN ============ -->
<div class="container">

  <!-- 可折叠日历 -->
  <div class="calendar-wrap" id="calendarWrap">
    <div class="calendar-card">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="calPrev">‹</button>
          <span class="cal-month" id="calMonth"></span>
          <button class="cal-nav-btn" id="calNext">›</button>
        </div>
      </div>
      <div class="cal-weekdays">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-footer">
        <span class="selected-date-label" id="selectedDateLabel">今天</span>
      </div>
    </div>
    <div class="cal-note">
      <div class="cal-note-label" data-i18n="notesLabel">📝 备注</div>
      <textarea id="calNoteInput" data-i18n-placeholder="notesPlaceholder" placeholder="这个月的备注…"></textarea>
    </div>
  </div>

  <!-- 规划与完成情况 -->
  <div class="panel">
    <div class="panel-title" data-i18n="panelTitle">
      📋 规划与完成情况
      <span class="badge" id="planCount">0 项</span>
    </div>
    <div class="plan-list" id="planList"></div>
    <div class="plan-add">
      <div class="time-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="#007aff" stroke-width="1.5" opacity=".6"/>
          <path d="M12 7.5v4.5l3 3" stroke="#007aff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>
        </svg>
        <div class="time-picker-trigger" id="tpTrigger">
          <span class="tp-part" id="tpHour">09</span>
          <span class="tp-sep"></span>
          <span class="tp-part" id="tpMin">00</span>
        </div>
        <div class="tp-dropdown" id="tpDropdown">
          <div class="tp-dropdown-inner">
            <div class="tp-col" id="tpColHour"></div>
            <div class="tp-col-sep"></div>
            <div class="tp-col" id="tpColMin"></div>
          </div>
          <div class="tp-confirm"><button id="tpConfirm" data-i18n="tpConfirm">完成</button></div>
        </div>
      </div>
      <textarea id="planInput" placeholder="添加事项…" rows="1" data-i18n-placeholder="addPlaceholder"></textarea>
      <button class="plan-add-btn" id="addPlanBtn">+</button>
    </div>
  </div>

</div>

<script src="js/helpers.js"></script>
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/lang.js"></script>
<script src="js/notes.js"></script>
<script src="js/timepicker.js"></script>
<script src="js/calendar.js"></script>
<script src="js/plans.js"></script>
<script src="js/app.js"></script>
</body>
</html>
